name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22.x.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (root)
        run: pnpm install -C frontend --frozen-lockfile && pnpm install -C backend --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Validate frontend formatting (optional)
        working-directory: frontend
        run: pnpm run lint || echo "No lint script defined"

      - name: Build backend
        working-directory: backend
        run: pnpm run build

      - name: Run backend lint
        working-directory: backend
        run: pnpm run lint
